<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LastenLog | Schoolproject vaste lasten</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/hanze-theme.css') }}">
</head>
<body>
    <div class="site-wrapper">
        <!-- Deze navigatie geeft bezoekers snel toegang tot home, login en registratie. -->
        <header class="site-nav">
            <div class="container-tight">
                <div class="nav-panel">
                    <a href="{{ url_for('home') }}" class="brand-lockup">
                        <span class="brand-mark"></span>
                        <span class="brand-text">
                            <strong>LastenLog</strong>
                            <span>Budgetdashboard</span>
                        </span>
                    </a>

                    <div class="nav-actions">
                        <a href="{{ url_for('login') }}" class="btn-outline-accent">Inloggen</a>
                        <a href="{{ url_for('register') }}" class="btn-accent">Registreren</a>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <!-- De hero laat in een oogopslag zien waar de website voor bedoeld is. -->
            <section class="public-hero">
                <div class="container-tight">
                    <div class="hero-grid">
                        <article class="hero-main">
                            <p class="eyebrow">Vaste lasten overzicht</p>
                            <h1 class="hero-title">Een dashboard voor je maandelijkse lasten.</h1>
                            <p class="hero-copy">
                                Vaste lasten overzicht
                                
                            </p>

                            <div class="hero-actions">
                                <a href="{{ url_for('register') }}" class="btn-accent">
                                    <i class="bi bi-person-plus"></i>
                                    Naar registreren
                                </a>
                                <a href="{{ url_for('login') }}" class="btn-outline-accent">
                                    <i class="bi bi-box-arrow-in-right"></i>
                                    Naar inloggen
                                </a>
                            </div>
                        </article>
                    </div>
                </div>
            </section>

        </main>

        <!-- De footer sluit de pagina rustig af met korte kerninformatie. -->
        <footer class="footer-bar">
            <div class="container-tight footer-inline">
                <span>LastenLog - schoolproject voor het beheren van vaste lasten</span>
                <span></span>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
