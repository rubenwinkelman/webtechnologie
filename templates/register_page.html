<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registreren | LastenLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/hanze-theme.css') }}">
</head>
<body>
    <main class="auth-page">
        <div class="container-tight">
            <div class="justify-content-center">
                <!-- Deze kaart bevat alleen de onderdelen die nodig zijn om te registreren. -->
                <section class="auth-card mx-auto" style="max-width: 34rem;">
                    <a href="{{ url_for('home') }}" class="brand-lockup mb-4">
                        <span class="brand-mark"></span>
                        <span class="brand-text">
                            <strong>LastenLog</strong>
                            <span>Registreren</span>
                        </span>
                    </a>

                    <h1 class="section-title mb-3">Registreren</h1>

                    {% if error %}
                    <div class="alert-soft mb-4">{{ error }}</div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mailadres</label>
                            <input type="email" class="form-control" name="email" id="email" placeholder="naam@student.nl" required>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="first_name" class="form-label">Voornaam</label>
                                <input type="text" class="form-control" name="first_name" id="first_name" placeholder="Voornaam" required>
                            </div>
                            <div class="col-md-6">
                                <label for="last_name" class="form-label">Achternaam</label>
                                <input type="text" class="form-control" name="last_name" id="last_name" placeholder="Achternaam" required>
                            </div>
                        </div>

                        <div class="mt-3 mb-3">
                            <label for="password" class="form-label">Wachtwoord</label>
                            <input type="password" class="form-control" name="password" id="password" placeholder="Kies een wachtwoord" required>
                        </div>

                        <div class="d-grid gap-3">
                            <button type="submit" class="btn-accent border-0">Registreren</button>
                            <a href="{{ url_for('login') }}" class="btn-outline-accent">Ik heb al een account</a>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </main>
</body>
</html>
